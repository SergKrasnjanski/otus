    password: postgres
  jwt:
    secret: bXktdmVyeS1zZWN1cmUtc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctbm90LWZvci1wcm9kdWN0aW9u
  admin:
    password: admin123
