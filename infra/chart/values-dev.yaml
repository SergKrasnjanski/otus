replicaCount: 1

image:
  pullPolicy: IfNotPresent
  tag: "latest"

ingress:
  hosts:
    - host: jwt-api.dev.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false

