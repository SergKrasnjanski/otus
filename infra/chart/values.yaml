replicaCount: 1

image:
  repository: jwt-api
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: jwt-api.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Не-секретные настройки приложения — попадают в ConfigMap
app:
  datasource:
    url: jdbc:postgresql://postgres:5432/postgres
  jpa:
    ddlAuto: validate
    openInView: "false"
  liquibase:
    changeLog: classpath:db/changelog/db.changelog-master.xml
  jwt:
    expiration: "86400000"
  admin:
    username: admin
    email: admin@example.com

# Секретные данные — переопределяй через --set или внешний Secret Manager
secrets:
  datasource:
    username: ""
    password: ""
  jwt:
    secret: ""
  admin:
    password: ""
